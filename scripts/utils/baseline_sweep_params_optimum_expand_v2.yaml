# Baseline fine-tune sweep space (v2)
# Focused extension beyond edge-hit values from previous run.

search_space:
  baseline_finetune.train.learning_rate: [7.0e-05, 8.0e-05, 1.0e-04]
  baseline_finetune.train.weight_decay: [0.0, 0.01]
  baseline_finetune.train.num_train_epochs: [6, 7, 8]
