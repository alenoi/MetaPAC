# ============================================================================
# AUTO PIPELINE CONFIGURATION - Qwen3 0.6B WOS (FAST, OFFLINE)
# ============================================================================

mode: auto:baseline_finetune

logging:
  level: INFO
  console_enabled: true
  file_enabled: true
  filename: pipeline.log

baseline_finetune:
  experiment_name: baseline_qwen3_06b_wos_fast_offline
  output_dir: targets/qwen3_06b/runs/baseline_qwen3_06b_wos_fast_offline

  model:
    pretrained_name: Qwen/Qwen3-0.6B
    torch_dtype: float32
    dropout: 0.1
    source:
      mode: hub
      local_files_only: true

  dataset:
    name: wos
    max_length: 256
    split_strategy: fixed_ratio_no_overlap
    val_split_ratio: 0.1
    test_split_ratio: 0.1
    deduplicate_by_text: true
    enforce_no_text_overlap: true
    seed: 42
    source:
      mode: hub
      local_files_only: true
      storage:
        root: metapac/artifacts/datasets
        mode: split

  train:
    seed: 42
    learning_rate: 2.0e-5
    weight_decay: 0.01
    num_train_epochs: 1
    eval_strategy: "steps"
    logging_steps: 25
    save_strategy: "steps"
    save_steps: 200
    save_total_limit: 2
    metric_for_best_model: "accuracy"
    greater_is_better: true
    load_best_model_at_end: true
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 2
    gradient_accumulation_steps: 16
    gradient_checkpointing: false
    fp16: true
    bf16: false
    max_grad_norm: 1.0
    warmup_ratio: 0.05
    early_stopping: true
    early_stopping_patience: 2
    early_stopping_threshold: 0.001
    dataloader_num_workers: 8
    collect_hooks_every_n_steps: 20
    hook_include_quantiles: false

  logging:
    report_to: ["tensorboard"]
    level: INFO
    console_enabled: true
    file_enabled: true
    filename: baseline.log

# Feature extraction overrides
reducer: "mean_pool"
token_average: true
input_dir: "metapac/artifacts/raw"
hook_pattern: "hook_stats_epoch*.csv"
phases: ["backward", "forward", "parameter"]
write_parquet: true
write_csv: true
max_files: null
chunksize: null
run_id: "qwen3_06b_wos_fast_offline"

# Meta-predictor overrides
experiment_name: "metapac_meta_qwen3_wos_fast_offline"
run_tag: "metapac_meta_qwen3_wos_fast_offline"

data:
  path: "metapac/artifacts/meta_dataset/meta_dataset_qwen3_wos_fast_offline.parquet"
  auto_infer:
    mode: "prefix_then_any"
    prefixes: ["grad_"]
    denylist: ["module", "step", "phase", "shape", "device", "dtype", "t"]
    min_numeric_ratio: 0.2
  split:
    test_size: 0.2
    val_size: 0.1
    group_col: "module"
    random_state: 42
  target:
    mode: "column"
    column_name: "grad_l1"

training:
  batch_size: 32
  max_epochs: 60
  early_stop_patience: 8
  lr: 0.0005
  weight_decay: 0.00005
  device: null
  num_workers: 0
  seed: 42
  loss: "huber"
  huber_delta: 0.25

model:
  hidden_sizes: [256, 128, 64]
  dropout: 0.1
  activation: "relu"

outputs:
  meta_dataset_path: "metapac/artifacts/meta_dataset/meta_dataset_qwen3_wos_fast_offline.parquet"
  runs_dir: "metapac/runs"
  results_dir: "metapac/results"
  checkpoints_dir: "metapac/runs/checkpoints"

compression:
  target_model: "targets/qwen3_06b/runs/baseline_qwen3_06b_wos_fast_offline"
  checkpoint_selector:
    mode: "best"
    exact_step: null
    apply_to_teacher_and_validation: true
  meta_checkpoint: "metapac/runs/checkpoints/metapac_meta_qwen3_wos_fast_offline"
  output_dir: "targets/qwen3_06b/models/experiments/compress_qwen3_06b_wos_fast_offline"
  require_weight_change_for_success: true
  baseline_model_config: "targets/qwen3_06b/runs/baseline_qwen3_06b_wos_fast_offline"
  zone_assignment:
    method: "kmeans"
    kmeans:
      n_clusters: 3
      n_init: 10
      random_state: 42
      min_high_fraction: 0.18
  zones:
    high:
      quantile_min: 0.7
      quantile_max: 1.0
      action: "keep"
    medium:
      quantile_min: 0.3
      quantile_max: 0.7
      action: "quantize"
    low:
      quantile_min: 0.0
      quantile_max: 0.3
      action: "prune"
  quantization:
    enabled: true
    mode: "rank_aware_trim"
    bits_lower: 4
    bits_upper: 8
    util_target: 0.98
    per_channel: true
    symmetric: true
    clip_percentile: 0.0
    export_variable_bit: true
    export_int: false
    export_packed: true
    mapping:
      type: "linear"
    layer_overrides: []
  pruning:
    enabled: true
    method: "magnitude"
    sparsity_level: 0.25
    min_importance_threshold: 0.004
    physical: false
    head_pruning_ratio: 0.1
    ffn_pruning_ratio: 0.1
    global_pruning: true
    min_heads_per_layer: 2
    min_ffn_ratio: 0.5
    normalize_scores: true
  fine_tuning:
    enabled: true
    output_dir: "targets/qwen3_06b/models/experiments/compress_qwen3_06b_wos_fast_offline/finetuned"
    data:
      dataset: "waashk/wos11967"
      dataset_config: null
      max_length: 256
      batch_size: 2
      split_strategy: fixed_ratio_no_overlap
      val_split_ratio: 0.1
      test_split_ratio: 0.1
      deduplicate_by_text: true
      enforce_no_text_overlap: true
      seed: 42
      source:
        mode: hub
        local_files_only: true
        storage:
          root: metapac/artifacts/datasets
          mode: split
    training:
      num_epochs: 1
      learning_rate: 2e-5
      weight_decay: 0.01
      warmup_ratio: 0.1
      gradient_clip: 1.0
      device: "cuda"
      num_workers: 0
    model_source:
      mode: hub
      local_files_only: true
    distillation:
      enabled: false
      teacher_model: "targets/qwen3_06b/runs/baseline_qwen3_06b_wos_fast_offline"
      teacher_source:
        mode: local
      temperature: 4.0
      alpha: 0.7
  validation:
    enabled: true
    baseline_model: "targets/qwen3_06b/runs/baseline_qwen3_06b_wos_fast_offline"
    dataset: "waashk/wos11967"
    dataset_config: null
    split: "test"
    split_strategy: fixed_ratio_no_overlap
    val_split_ratio: 0.1
    test_split_ratio: 0.1
    deduplicate_by_text: true
    enforce_no_text_overlap: true
    seed: 42
    runtime: "auto"
    batch_size: 16
    max_length: 256
    save_results: true
    source:
      mode: hub
      local_files_only: true
      storage:
        root: metapac/artifacts/datasets
        mode: split