# ============================================================================
# META-PREDICTOR TRAINING CONFIGURATION - DistilBERT SST-2
# ============================================================================
# Train meta-predictor on real DistilBERT parameter statistics
# This is trained on actual model data (420 parameter entries)
#
# Use this to train the importance predictor for compression

mode: train_meta

# ============================================================================
# EXPERIMENT
# ============================================================================
experiment_name: "metapac_meta_distilbert_sst2"

# ============================================================================
# DATA
# ============================================================================
data:
  # Input data path
  path: "metapac/artifacts/meta_dataset/distilbert_sst2/meta_dataset.parquet"
  
  # Feature inference settings
  auto_infer:
    mode: "prefix_then_any"
    prefixes:
      - "grad_"
    denylist:
      - "module"
      - "step"
      - "phase"
      - "shape"
      - "device"
      - "dtype"
      - "t"
    min_numeric_ratio: 0.2
  
  # Train/val/test split
  split:
    test_size: 0.2
    val_size: 0.1
    group_col: "module"
    random_state: 42
  
  # Target configuration
  target:
    mode: "column"
    column_name: "grad_l1"

# ============================================================================
# TRAINING
# ============================================================================
training:
  batch_size: 32
  max_epochs: 100
  early_stop_patience: 15
  lr: 0.001
  weight_decay: 0.0001
  device: "cpu"
  num_workers: 0
  seed: 42
  loss: "huber"
  huber_delta: 0.5

# ============================================================================
# MODEL
# ============================================================================
model:
  hidden_sizes: [ 128, 64, 32 ]
  dropout: 0.15
  activation: "relu"

# ============================================================================
# OUTPUT
# ============================================================================
outputs:
  runs_dir: "metapac/runs"
  results_dir: "metapac/results"
  checkpoints_dir: "metapac/runs/checkpoints"
