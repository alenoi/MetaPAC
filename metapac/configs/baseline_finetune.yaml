# ============================================================================
# BASELINE FINE-TUNING CONFIGURATION
# ============================================================================
# Default configuration for fine-tuning baseline DistilBERT model on SST-2
# This is Stage 0 of the MetaPAC pipeline (before feature extraction)

mode: baseline_finetune

# ============================================================================
# BASELINE FINE-TUNING SETTINGS
# ============================================================================
baseline_finetune:
  experiment_name: baseline_distilbert_sst2
  output_dir: targets/distilbert/runs/baseline_distilbert_sst2
  
  # Model configuration
  model:
    pretrained_name: distilbert-base-uncased
    dropout: 0.1
  
  # Dataset configuration
  dataset:
    name: sst2
    max_length: 256
    val_split_ratio: null  # Use default train/val split
    seed: 42
  
  # Training configuration
  train:
    seed: 42
    learning_rate: 2.0e-5
    weight_decay: 0.01
    num_train_epochs: 10
    
    # Evaluation and saving
    eval_strategy: "steps"
    logging_steps: 300
    save_strategy: "steps"
    save_steps: 600
    save_total_limit: 2
    
    # Best model selection
    metric_for_best_model: "f1"
    greater_is_better: true
    load_best_model_at_end: true
    
    # Batch sizes
    per_device_train_batch_size: 32
    per_device_eval_batch_size: 64
    
    # Optimization
    gradient_accumulation_steps: 1
    gradient_checkpointing: false  # Set to true for low VRAM
    max_grad_norm: 1.0
    warmup_ratio: 0.1
    
    # Early stopping
    early_stopping: true
    early_stopping_patience: 5
    early_stopping_threshold: 0.001
    
    # Mixed precision (auto-detected by main.py)
    # fp16: true
    # bf16: false
    
    # Data loading
    dataloader_num_workers: 2
  
  # Logging configuration
  logging:
    report_to: ["tensorboard"]

# ============================================================================
# NOTES
# ============================================================================
# This config is used by the pipeline to fine-tune the baseline model.
# The output checkpoint will be used for:
# 1. Feature extraction (next stage)
# 2. Compression target model
# 
# Default output: targets/distilbert/runs/baseline_distilbert_sst2/checkpoint-XXXX
