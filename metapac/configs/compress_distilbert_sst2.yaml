# ============================================================================
# COMPRESSION CONFIGURATION - DistilBERT SST-2
# ============================================================================
# Three-zone compression for DistilBERT SST-2.
#
# This entrypoint is intended for the standard researcher workflow:
# 1. fine-tune the baseline model,
# 2. train a DistilBERT meta-predictor,
# 3. run compression with logical pruning, variable-bit quantization,
#    optional recovery fine-tuning, and validation.
#
# The meta checkpoint path below is a prefix-style reference. MetaPAC will
# resolve it to the latest matching portable checkpoint directory under
# `metapac/runs/checkpoints/`.

mode: compress

# ============================================================================
# COMPRESSION
# ============================================================================
compression:
  # Model paths
  target_model: "targets/distilbert/runs/baseline_distilbert_sst2"
  checkpoint_selector:
    mode: "best"
    exact_step: null
    apply_to_teacher_and_validation: true
  meta_checkpoint: "metapac/runs/checkpoints/metapac_meta_distilbert_sst2"
  output_dir: "targets/distilbert/models/experiments/compress_distilbert_sst2"
  require_weight_change_for_success: true

  zone_assignment:
    method: "kmeans"
    kmeans:
      n_clusters: 3
      n_init: 10
      random_state: 42
      min_high_fraction: 0.18
  
  # Three-zone configuration
  zones:
    high:
      quantile_min: 0.7
      quantile_max: 1.0
      action: "keep"
    
    medium:
      quantile_min: 0.3
      quantile_max: 0.7
      action: "quantize"
    
    low:
      quantile_min: 0.0
      quantile_max: 0.3
      action: "prune"
  
  # Quantization settings
  quantization:
    enabled: true
    mode: "rank_aware_trim"
    bits_lower: 4
    bits_upper: 8
    util_target: 0.98
    per_channel: true
    symmetric: true
    clip_percentile: 0.0
    # Export options (choose one):
    export_variable_bit: true   # NEW: True runtime memory savings (4-16x compression)
    export_int: false            # Legacy: INT8-only export
    export_packed: false         # Deprecated: File compression only (no runtime savings)
    mapping:
      type: "linear"
    layer_overrides:
      - pattern: ".*attention.*"
        bits: 8
      - pattern: ".*classifier.*"
        bits: 8
      - pattern: ".*embeddings.word_embeddings.*"
        bits: 8
        force_quantize: true
      - pattern: ".*embeddings.position_embeddings.*"
        bits: 8
        force_quantize: true
  
  # Pruning settings
  pruning:
    enabled: true
    method: "magnitude"
    physical: false
    head_pruning_ratio: 0.1
    ffn_pruning_ratio: 0.1
    global_pruning: true
    min_heads_per_layer: 2
    min_ffn_ratio: 0.5
    normalize_scores: true
  
  # Fine-tuning settings with Knowledge Distillation
  fine_tuning:
    enabled: true
    output_dir: "targets/distilbert/models/experiments/compress_distilbert_sst2/finetuned"
    data:
      dataset: "glue"
      dataset_config: "sst2"
      max_length: 128
      batch_size: 32
    training:
      num_epochs: 1
      learning_rate: 2e-5
      weight_decay: 0.01
      warmup_ratio: 0.1
      gradient_clip: 1.0
      device: "cuda"
      num_workers: 0
    distillation:
      enabled: true
      teacher_model: "targets/distilbert/runs/baseline_distilbert_sst2"
      temperature: 4.0
      alpha: 0.7

  validation:
    enabled: true
    baseline_model: "targets/distilbert/runs/baseline_distilbert_sst2"
    dataset: "glue"
    dataset_config: "sst2"
    split: "validation"
    runtime: "auto"
    batch_size: 32
    max_length: 128
    save_results: true
