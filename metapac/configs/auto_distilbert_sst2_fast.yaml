# ============================================================================
# AUTO PIPELINE CONFIGURATION - DistilBERT SST-2 (FAST)
# ============================================================================
# Run the full DistilBERT pipeline with speed-oriented overrides.

mode: auto:baseline_finetune

baseline_finetune:
  experiment_name: baseline_distilbert_sst2_fast
  output_dir: targets/distilbert/runs/baseline_distilbert_sst2_fast

  model:
    pretrained_name: distilbert-base-uncased
    dropout: 0.1

  dataset:
    name: sst2
    max_length: 128
    val_split_ratio: null
    seed: 42

  train:
    seed: 42
    learning_rate: 2.0e-5
    weight_decay: 0.01
    num_train_epochs: 1
    eval_strategy: "steps"
    logging_steps: 25
    save_strategy: "steps"
    save_steps: 200
    save_total_limit: 2
    metric_for_best_model: "accuracy"
    greater_is_better: true
    load_best_model_at_end: true
    per_device_train_batch_size: 32
    per_device_eval_batch_size: 64
    gradient_accumulation_steps: 1
    gradient_checkpointing: false
    fp16: true
    bf16: false
    max_grad_norm: 1.0
    warmup_ratio: 0.05
    early_stopping: true
    early_stopping_patience: 2
    early_stopping_threshold: 0.001
    dataloader_num_workers: 8
    collect_hooks_every_n_steps: 20
    hook_include_quantiles: false

  logging:
    report_to: ["tensorboard"]

# Feature extraction overrides
reducer: "mean_pool"
token_average: true
input_dir: "metapac/artifacts/raw"
hook_pattern: "hook_stats_epoch*.csv"
phases: ["backward", "forward", "parameter"]
write_parquet: true
write_csv: true
max_files: null
chunksize: null
run_id: "distilbert_sst2_fast"

# Meta-predictor overrides
experiment_name: "metapac_meta_distilbert_sst2_fast"
run_tag: "metapac_meta_distilbert_sst2_fast"

data:
  path: "metapac/artifacts/meta_dataset/meta_dataset.parquet"
  auto_infer:
    mode: "prefix_then_any"
    prefixes: ["grad_"]
    denylist: ["module", "step", "phase", "shape", "device", "dtype", "t"]
    min_numeric_ratio: 0.2
  split:
    test_size: 0.2
    val_size: 0.1
    group_col: "module"
    random_state: 42
  target:
    mode: "column"
    column_name: "grad_l1"

training:
  batch_size: 32
  max_epochs: 60
  early_stop_patience: 8
  lr: 0.0005
  weight_decay: 0.00005
  device: null
  num_workers: 0
  seed: 42
  loss: "huber"
  huber_delta: 0.25

model:
  hidden_sizes: [256, 128, 64]
  dropout: 0.1
  activation: "relu"

outputs:
  meta_dataset_path: "metapac/artifacts/meta_dataset/meta_dataset.parquet"
  runs_dir: "metapac/runs"
  results_dir: "metapac/results"
  checkpoints_dir: "metapac/runs/checkpoints"

# Compression overrides
compression:
  target_model: "targets/distilbert/runs/baseline_distilbert_sst2_fast"
  checkpoint_selector:
    mode: "best"
    exact_step: null
    apply_to_teacher_and_validation: true
  meta_checkpoint: "metapac/runs/checkpoints/metapac_meta_distilbert_sst2_fast"
  output_dir: "targets/distilbert/models/experiments/compress_distilbert_sst2_fast"
  require_weight_change_for_success: true
  zone_assignment:
    method: "kmeans"
    kmeans:
      n_clusters: 3
      n_init: 10
      random_state: 42
      min_high_fraction: 0.18
  zones:
    high:
      quantile_min: 0.7
      quantile_max: 1.0
      action: "keep"
    medium:
      quantile_min: 0.3
      quantile_max: 0.7
      action: "quantize"
    low:
      quantile_min: 0.0
      quantile_max: 0.3
      action: "prune"
  quantization:
    enabled: true
    mode: "rank_aware_trim"
    bits_lower: 4
    bits_upper: 8
    util_target: 0.98
    per_channel: true
    symmetric: true
    clip_percentile: 0.0
    export_variable_bit: true
    export_int: false
    export_packed: true
    mapping:
      type: "linear"
    layer_overrides:
      - pattern: ".*attention.*"
        bits: 8
      - pattern: ".*classifier.*"
        bits: 8
      - pattern: ".*embeddings.word_embeddings.*"
        bits: 8
        force_quantize: true
      - pattern: ".*embeddings.position_embeddings.*"
        bits: 8
        force_quantize: true
  pruning:
    enabled: true
    method: "magnitude"
    physical: false
    head_pruning_ratio: 0.1
    ffn_pruning_ratio: 0.1
    global_pruning: true
    min_heads_per_layer: 2
    min_ffn_ratio: 0.5
    normalize_scores: true
  fine_tuning:
    enabled: true
    output_dir: "targets/distilbert/models/experiments/compress_distilbert_sst2_fast/finetuned"
    data:
      dataset: "glue"
      dataset_config: "sst2"
      max_length: 128
      batch_size: 32
      train_max_samples: 2000
      validation_max_samples: 500
    training:
      num_epochs: 1
      learning_rate: 2e-5
      weight_decay: 0.01
      warmup_ratio: 0.1
      gradient_clip: 1.0
      device: "cuda"
      num_workers: 0
    distillation:
      enabled: true
      teacher_model: "targets/distilbert/runs/baseline_distilbert_sst2_fast"
      temperature: 4.0
      alpha: 0.7
  validation:
    enabled: true
    baseline_model: "targets/distilbert/runs/baseline_distilbert_sst2_fast"
    dataset: "glue"
    dataset_config: "sst2"
    split: "validation"
    runtime: "auto"
    batch_size: 32
    max_length: 128
    save_results: true