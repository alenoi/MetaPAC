[pytest]
# Pytest configuration for MetaPAC compression testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    smoke: Fast synthetic smoke tests
    preparation: Tests for preparation module
    pruning: Tests for pruning phase
    quantization: Tests for quantization phase
    finetuning: Tests for fine-tuning phase
    export: Tests for export and artifact finalization
    pipeline: Tests for end-to-end pipeline execution

# Test output
addopts = 
    --verbose
    --tb=short
    --strict-markers

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

# Test paths
testpaths = tests

# Ignore files
norecursedirs = .git .venv venv build dist *.egg-info __pycache__ .pytest_cache
