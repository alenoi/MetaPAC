# ============================================================================
# COMPRESSION CONFIGURATION - DistilBERT SST-2
# ============================================================================
# Three-zone compression for DistilBERT:
#   - High importance: Keep full precision
#   - Medium importance: 8-bit quantization
#   - Low importance: 4-bit quantization
#   - No pruning (quantization only)
#
# Use this for quantization-only compression experiments

mode: compress

# ============================================================================
# COMPRESSION
# ============================================================================
compression:
  # Model paths
  target_model: "targets/distilbert/runs/checkpoints/checkpoint-12600"
  meta_checkpoint: "artifacts/checkpoints/metapac_meta_distilbert_sst2_best"
  output_dir: "targets/distilbert/models/experiments/compressed_rank_aware_v1"
  
  # Three-zone configuration
  zones:
    high:
      quantile_min: 0.7
      quantile_max: 1.0
      action: "keep"
    
    medium:
      quantile_min: 0.3
      quantile_max: 0.7
      action: "quantize"
    
    low:
      quantile_min: 0.0
      quantile_max: 0.3
      action: "quantize"
  
  # Quantization settings
  quantization:
    enabled: true
    mode: "rank_aware_trim"
    bits_lower: 4
    bits_upper: 8
    util_target: 0.98
    per_channel: true
    symmetric: true
    clip_percentile: 0.0
    # Export options (choose one):
    export_variable_bit: true   # NEW: True runtime memory savings (4-16x compression)
    export_int: false            # Legacy: INT8-only export
    export_packed: false         # Deprecated: File compression only (no runtime savings)
    mapping:
      type: "linear"
    layer_overrides:
      - pattern: ".*attention.*"
        bits: 8
      - pattern: ".*classifier.*"
        bits: 8
      - pattern: ".*embeddings.word_embeddings.*"
        bits: 8
        force_quantize: true
      - pattern: ".*embeddings.position_embeddings.*"
        bits: 8
        force_quantize: true
  
  # Pruning settings (DISABLED - quantization only)
  pruning:
    enabled: false
    method: "magnitude"
    physical: true
    head_pruning_ratio: 0.0
    ffn_pruning_ratio: 0.0
    global_pruning: true
    min_heads_per_layer: 2
    min_ffn_ratio: 0.5
    normalize_scores: true
  
  # Fine-tuning settings (DISABLED)
  fine_tuning:
    enabled: false
    output_dir: "targets/distilbert/models/experiments/compressed_rank_aware_v1/finetuned"
    data:
      dataset: "glue"
      dataset_config: "sst2"
      max_length: 512
      batch_size: 128
    training:
      num_epochs: 2
      learning_rate: 2e-5
      weight_decay: 0.01
      warmup_ratio: 0.1
      gradient_clip: 1.0
      device: "cuda"
      num_workers: 0
