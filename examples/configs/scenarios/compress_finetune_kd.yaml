# ============================================================================
# COMPRESSION + FINE-TUNING: Knowledge Distillation enabled
# ============================================================================
mode: compress

compression:
  target_model: "targets/distilbert/runs/checkpoints/checkpoint-12600"
  meta_checkpoint: "artifacts/checkpoints/metapac_meta_distilbert_sst2_best"
  output_dir: "targets/distilbert/models/experiments/compress_finetune_kd"

  zones:
    high:
      quantile_min: 0.7
      quantile_max: 1.0
      action: "keep"
    medium:
      quantile_min: 0.3
      quantile_max: 0.7
      action: "quantize"
    low:
      quantile_min: 0.0
      quantile_max: 0.3
      action: "quantize"

  quantization:
    enabled: true
    mode: "rank_aware_trim"
    bits_lower: 4
    bits_upper: 8
    util_target: 0.98 
    per_channel: true
    symmetric: true
    clip_percentile: 0.0
    export_variable_bit: true
    export_int: false
    export_packed: true
    mapping:
      type: "linear"
    layer_overrides:
      - pattern: ".*attention.*"
        bits: 8
      - pattern: ".*classifier.*"
        bits: 8


  pruning:
    enabled: true
    method: "magnitude"     
    physical: false          
    head_pruning_ratio: 0.30
    ffn_pruning_ratio: 0.30
    global_pruning: true
    layer_wise: true
    min_heads_per_layer: 2
    min_ffn_ratio: 0.5
    normalize_scores: true

  fine_tuning:
    enabled: true
    output_dir: "targets/distilbert/models/experiments/compress_finetune_kd/finetuned"
    data:
      dataset: "glue"
      dataset_config: "sst2"
      max_length: 128
      batch_size: 16
    training:
      num_epochs: 2
      learning_rate: 2e-5
      weight_decay: 0.01
      warmup_ratio: 0.1
      gradient_clip: 1.0
      device: "cuda"
      num_workers: 0
    distillation:
      enabled: true
      teacher_model: "targets/distilbert/runs/checkpoints/checkpoint-12600"
      temperature: 4.0
      alpha: 0.5

  validation:
    enabled: true
    dataset: "glue"
    dataset_config: "sst2"
    split: "validation"
    runtime: "auto"
    batch_size: 64
    max_length: 128
    save_results: true
